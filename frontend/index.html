<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scorelia — AI Career Intelligence Platform</title>
    <meta name="title" content="Scorelia — AI Career Intelligence Platform" />
    <meta name="description" content="Scorelia is an AI-powered Career Intelligence Platform. Map out custom career pivots, audit missing skill gaps, and execute weekly learning milestones." />
    <link rel="manifest" href="/manifest.json" />
    <script>
      (function() {
        try {
          const theme = localStorage.getItem('scorelia-theme') || 'system';
          const root = document.documentElement;
          root.classList.remove('light', 'dark');
          if (theme === 'system') {
            const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            root.classList.add(systemTheme);
          } else {
            root.classList.add(theme);
          }
        } catch (e) {
          console.error('Failed to initialize theme early:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
